<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>城市收集 · 路线探险</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0e1a; color: #fff;
    overflow: hidden; height: 100vh;
  }

  #map { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 0; }

  /* 顶部面板 */
  .hud {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.88); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 10px 16px;
    min-width: 340px; max-width: 94vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .hud-title {
    font-size: 12px; font-weight: 700; text-align: center; margin-bottom: 8px;
    background: linear-gradient(90deg, #f9d976, #f39c12);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .hud-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
  .hud-input {
    flex: 1; min-width: 80px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 6px 10px;
    color: #fff; font-size: 12px; font-family: inherit;
    outline: none; transition: 0.2s;
  }
  .hud-input::placeholder { color: rgba(255,255,255,0.25); }
  .hud-input:focus { border-color: #f39c12; background: rgba(255,255,255,0.1); }
  .hud-select {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 6px 6px; color: #fff; font-size: 12px;
    font-family: inherit; outline: none; cursor: pointer;
    max-width: 64px;
  }
  .hud-btn {
    padding: 6px 14px; border: none; border-radius: 8px;
    font-size: 12px; font-family: inherit; font-weight: 600;
    background: linear-gradient(135deg, #f9d976, #f39c12);
    color: #0a0e1a; cursor: pointer; transition: 0.2s;
    white-space: nowrap;
  }
  .hud-btn:hover { transform: scale(1.04); box-shadow: 0 4px 16px rgba(243,156,18,0.3); }
  .hud-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 出行方式标签 */
  .mode-tabs {
    display: flex; gap: 4px; margin-bottom: 8px; justify-content: center;
  }
  .mode-tab {
    padding: 3px 10px; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; font-size: 11px; font-family: inherit;
    background: transparent; color: rgba(255,255,255,0.4);
    cursor: pointer; transition: 0.2s;
  }
  .mode-tab:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
  .mode-tab.active {
    background: rgba(243,156,18,0.15); border-color: #f39c12; color: #f9d976;
  }

  .wp-toggle {
    color: rgba(255,255,255,0.35); font-size: 11px;
    cursor: pointer; text-align: center; margin-top: 5px;
    transition: 0.2s;
  }
  .wp-toggle:hover { color: rgba(255,255,255,0.6); }
  .wp-area { display: none; margin-top: 5px; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .wp-area.show { display: flex; }
  .wp-label { color: rgba(255,255,255,0.25); font-size: 10px; align-self: center; }

  /* 收集进度条 */
  .progress-wrap {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,14,26,0.92); backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 10px 16px 14px;
    display: none;
  }
  .progress-wrap.show { display: block; }
  .progress-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .progress-label { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  .progress-num { font-size: 12px; font-weight: 700; color: #f9d976; }
  .progress-track {
    width: 100%; height: 3px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden; margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #f9d976, #f39c12);
    border-radius: 3px; transition: width 0.4s ease;
  }
  .collect-scroll {
    display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 4px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  .c-card {
    flex: 0 0 110px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px; padding: 6px 8px;
    font-size: 10px; cursor: pointer;
    transition: all 0.3s;
  }
  .c-card.collected {
    border-color: rgba(249,217,118,0.25);
    background: rgba(249,217,118,0.05);
  }
  .c-card .ci { font-size: 14px; }
  .c-card .cn {
    font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.45);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-top: 1px;
  }
  .c-card.collected .cn { color: #fff; }
  .c-card .ca {
    font-size: 8px; color: rgba(255,255,255,0.25);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .c-card .cb {
    position: relative; float: right; margin-top: -14px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #f39c12; color: #0a0e1a;
    font-size: 7px; font-weight: 700;
    display: none; align-items: center; justify-content: center;
  }
  .c-card.collected .cb { display: flex; }

  /* 空状态 */
  .empty-state {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 1; text-align: center; pointer-events: none;
  }
  .empty-state .icon { font-size: 40px; opacity: 0.25; }
  .empty-state .text { font-size: 13px; color: rgba(255,255,255,0.15); margin-top: 6px; }

  /* 加载 */
  .loading-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,14,26,0.85);
    display: none; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #f9d976;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay .lt { margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.4); }

  /* 收藏品标记 */
  .c-marker {
    width: 26px; height: 26px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #f9d976, #e67e22);
    box-shadow: 0 0 16px rgba(249,217,118,0.35), 0 0 32px rgba(249,217,118,0.15);
    border: 2px solid rgba(255,255,255,0.25);
    cursor: pointer;
    animation: glow 2s ease-in-out infinite;
    transition: all 0.3s;
  }
  .c-marker.done {
    background: radial-gradient(circle at 30% 30%, #2ecc71, #27ae60);
    box-shadow: 0 0 8px rgba(46,204,113,0.15);
    animation: none; opacity: 0.45;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 16px rgba(249,217,118,0.35), 0 0 32px rgba(249,217,118,0.15); }
    50% { box-shadow: 0 0 24px rgba(249,217,118,0.55), 0 0 48px rgba(249,217,118,0.25); }
  }

  .toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0);
    z-index: 300;
    background: rgba(10,14,26,0.95); backdrop-filter: blur(20px);
    border: 1px solid rgba(249,217,118,0.25);
    border-radius: 16px; padding: 24px 32px;
    text-align: center;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 16px 64px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .toast.show { transform: translate(-50%,-50%) scale(1); }
  .toast .ti { font-size: 40px; }
  .toast .tm { font-size: 14px; font-weight: 600; margin: 4px 0 2px; }
  .toast .ts { font-size: 11px; color: rgba(255,255,255,0.35); }

  @media (max-width: 640px) {
    .hud { top: 6px; padding: 8px 10px; min-width: auto; width: 97vw; }
    .hud-input { min-width: 50px; font-size: 11px; padding: 5px 6px; }
    .hud-btn { font-size: 11px; padding: 5px 10px; }
    .c-card { flex: 0 0 90px; }
  }
</style>
</head>
<body>

<div id="map"></div>
<div class="empty-state" id="emptyState">
  <div class="icon">✦</div>
  <div class="text">输入起终点，探索沿途宝物</div>
</div>

<div class="hud" id="hud">
  <div class="hud-title">✦ 城市收集 · 路线探险</div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="driving">🚗 驾车</button>
    <button class="mode-tab" data-mode="walking">🚶 步行</button>
    <button class="mode-tab" data-mode="riding">🚲 骑行</button>
    <button class="mode-tab" data-mode="transit">🚌 公交</button>
  </div>

  <div class="hud-row">
    <input class="hud-input" id="inpStart" placeholder="起点" value="中关村">
    <input class="hud-input" id="inpEnd" placeholder="终点" value="北京大学">
    <select class="hud-select" id="inpCity"><option>北京</option><option>上海</option><option>杭州</option><option>深圳</option><option>广州</option></select>
    <button class="hud-btn" id="btnGo">✦ 探索</button>
  </div>

  <div class="wp-toggle" id="wpToggle">+ 途经点</div>
  <div class="wp-area" id="wpArea">
    <span class="wp-label">经</span>
    <input class="hud-input" id="inpW1" placeholder="途经 1">
    <input class="hud-input" id="inpW2" placeholder="途经 2">
    <input class="hud-input" id="inpW3" placeholder="途经 3">
  </div>
</div>

<div class="loading-overlay" id="loadOverlay">
  <div class="spinner"></div>
  <div class="lt">规划路线中...</div>
</div>

<div class="toast" id="toast"></div>

<div class="progress-wrap" id="progWrap">
  <div class="progress-top">
    <span class="progress-label">✦ 收集进度</span>
    <span class="progress-num"><span id="collectedNum">0</span> / <span id="totalNum">0</span></span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
  <div class="collect-scroll" id="collectGrid"></div>
</div>

<script src="https://webapi.amap.com/loader.js"></script>
<script>
(function () {
  var KEY = '89827f0a4f8332083fae80ec625b2908';
  var SEC = '4520ad0e91e64bb38777e90bf617351b';
  window._AMapSecurityConfig = { securityJsCode: SEC };

  var map, geocoder;
  var overlays = [];         // 所有可清除覆盖物
  var collectItems = [];     // { id, lnglat, name, addr, collected }
  var collectedSet = new Set();
  var travelMode = 'driving';
  var isSearching = false;

  var $ = function (id) { return document.getElementById(id); };
  var D = {
    inpStart: $('inpStart'), inpEnd: $('inpEnd'), inpCity: $('inpCity'),
    inpW1: $('inpW1'), inpW2: $('inpW2'), inpW3: $('inpW3'),
    btnGo: $('btnGo'), wpToggle: $('wpToggle'), wpArea: $('wpArea'),
    loadOverlay: $('loadOverlay'), emptyState: $('emptyState'),
    progWrap: $('progWrap'), collectedNum: $('collectedNum'),
    totalNum: $('totalNum'), progFill: $('progFill'), collectGrid: $('collectGrid'),
    toast: $('toast')
  };

  // === 出行模式切换 ===
  document.querySelectorAll('.mode-tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.mode-tab').forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      travelMode = this.dataset.mode;
      if (D.inpStart.value.trim() && D.inpEnd.value.trim()) doSearch();
    });
  });

  D.wpToggle.addEventListener('click', function () {
    D.wpArea.classList.toggle('show');
    this.textContent = D.wpArea.classList.contains('show') ? '− 收起途经点' : '+ 途经点';
  });

  D.btnGo.addEventListener('click', doSearch);
  [D.inpStart, D.inpEnd, D.inpW1, D.inpW2, D.inpW3].forEach(function (el) {
    el.addEventListener('keydown', function (e) { if (e.key === 'Enter') doSearch(); });
  });

  // === 初始化地图 ===
  AMapLoader.load({
    key: KEY,
    version: '2.0',
    plugins: ['AMap.Driving', 'AMap.Walking', 'AMap.Riding', 'AMap.Transfer',
              'AMap.Geocoder', 'AMap.Scale', 'AMap.ToolBar', 'AMap.ControlBar']
  }).then(function (AMap) {
    window.AMap = AMap;
    geocoder = new AMap.Geocoder();
    map = new AMap.Map('map', {
      viewMode: '3D',
      zoom: 13, center: [116.31, 39.95],
      mapStyle: 'amap://styles/dark',
      pitch: 40, rotation: 0,
      zooms: [3, 20],
      showIndoorMap: false
    });
    map.addControl(new AMap.Scale());
    map.addControl(new AMap.ToolBar({ position: 'RT' }));
    map.addControl(new AMap.ControlBar({
      position: { right: '10px', top: '80px' },
      showZoomBar: false,
      showControlButton: true
    }));
    // 启用 3D 拖拽旋转（默认已启用）
    map.setDefaultCursor('grab');
    map.setFeatures(['bg', 'road', 'building']);
  }).catch(function (e) {
    D.emptyState.querySelector('.text').textContent = '地图加载失败: ' + e.message;
  });

  // === 构建途经点数组 ===
  function buildPoints() {
    var city = D.inpCity.value;
    var pts = [{ keyword: D.inpStart.value.trim(), city: city }];
    [D.inpW1, D.inpW2, D.inpW3].forEach(function (el) {
      var v = el.value.trim();
      if (v) pts.push({ keyword: v, city: city });
    });
    pts.push({ keyword: D.inpEnd.value.trim(), city: city });
    return pts;
  }

  // === 主搜索 ===
  function doSearch() {
    if (!D.inpStart.value.trim() || !D.inpEnd.value.trim()) {
      toast('⚠️', '请输入起点和终点', ''); return;
    }
    if (isSearching) return;
    isSearching = true;

    clearMap();
    D.loadOverlay.classList.add('show');
    D.progWrap.classList.remove('show');
    D.emptyState.style.display = 'none';

    var points = buildPoints();
    // 非驾车模式只取起终点（途经点仅驾车支持）
    var searchPoints = (travelMode === 'driving') ? points : [points[0], points[points.length - 1]];

    switch (travelMode) {
      case 'driving':
        var svc = new AMap.Driving({ policy: AMap.DrivingPolicy.LEAST_FEE });
        svc.search(searchPoints, onRouteResult);
        break;
      case 'walking':
        var svc = new AMap.Walking();
        svc.search(searchPoints, onRouteResult);
        break;
      case 'riding':
        var svc = new AMap.Riding();
        svc.search(searchPoints, onRouteResult);
        break;
      case 'transit':
        var svc = new AMap.Transfer({ city: D.inpCity.value, policy: AMap.TransferPolicy.LEAST_TIME });
        svc.search(searchPoints, onRouteResult);
        break;
    }
  }

  // 驾车用 route.routes[0]，公交用 plan 结构
  function onRouteResult(status, result) {
    D.loadOverlay.classList.remove('show');
    isSearching = false;

    if (status !== 'complete') {
      toast('⚠️', '路线规划失败', '请检查起终点是否正确');
      D.emptyState.style.display = 'block';
      return;
    }

    var routePath = [];

    if (travelMode === 'transit') {
      var plan = result.plans && result.plans[0];
      if (!plan) { toast('⚠️', '公交路线规划失败', ''); D.emptyState.style.display = 'block'; return; }
      // 公交：绘制各段路径
      plan.segments.forEach(function (seg) {
        var p = (seg.transit && seg.transit.path) || (seg.walking && seg.walking.path) || [];
        if (p.length) {
          routePath.push.apply(routePath, p);
          addOverlay(new AMap.Polyline({
            path: p,
            strokeColor: seg.transit ? '#f39c12' : '#52c41a',
            strokeWeight: seg.transit ? 5 : 3,
            strokeOpacity: 0.8,
            lineJoin: 'round', lineCap: 'round',
            zIndex: 50
          }));
        }
      });
    } else {
      var route = result.routes && result.routes[0];
      if (!route) { toast('⚠️', '路线规划失败', ''); D.emptyState.style.display = 'block'; return; }
      // 提取路径点
      if (route.steps) {
        route.steps.forEach(function (s) { routePath.push.apply(routePath, s.path); });
      } else if (route.rides) {
        route.rides.forEach(function (r) { routePath.push.apply(routePath, r.path); });
      }
      // 主线
      var color = { driving: '#f39c12', walking: '#52c41a', riding: '#fa8c16' }[travelMode] || '#f39c12';
      addOverlay(new AMap.Polyline({
        path: routePath, strokeColor: color,
        strokeWeight: 5, strokeOpacity: 0.85,
        lineJoin: 'round', lineCap: 'round', zIndex: 50
      }));
    }

    if (routePath.length < 2) { toast('⚠️', '路径太短', ''); return; }

    // 缩放视野
    map.setFitView(null, false, [60, 60, 60, 180]);

    // 生成收集品
    spawnCollectibles(routePath);
  }

  // === 覆盖物管理 ===
  function addOverlay(obj) {
    map.add(obj);
    overlays.push(obj);
  }

  function clearMap() {
    overlays.forEach(function (o) { map.remove(o); });
    overlays = [];
    collectItems = [];
    collectedSet.clear();
    D.collectGrid.innerHTML = '';
  }

  // === 收集品生成 ===
  function spawnCollectibles(path) {
    if (path.length < 2) return;

    var pts = [];
    var step = Math.max(1, Math.floor(path.length / 8));
    for (var i = step; i < path.length - 1; i += step) {
      pts.push(path[i]);
    }
    // 去重
    var dedup = [];
    pts.forEach(function (p) {
      var dup = false;
      for (var j = 0; j < dedup.length; j++) {
        if (distBetween(p, dedup[j]) < 80) { dup = true; break; }
      }
      if (!dup) dedup.push(p);
    });
    // 最多 10 个
    if (dedup.length > 10) {
      var s2 = Math.floor(dedup.length / 10);
      var tmp = [];
      for (var i = 0; i < dedup.length && tmp.length < 10; i += s2) tmp.push(dedup[i]);
      dedup = tmp;
    }

    collectItems = dedup.map(function (p, idx) {
      return { id: idx, lnglat: p, name: '探索点 #' + (idx + 1), addr: '', collected: false };
    });

    // 创建地图标记
    collectItems.forEach(function (item) {
      var el = document.createElement('div');
      el.className = 'c-marker';
      el.dataset.id = item.id;
      var mkr = new AMap.Marker({
        map: map, position: item.lnglat,
        content: el, offset: new AMap.Pixel(-13, -13),
        zIndex: 80
      });
      mkr._cid = item.id;
      mkr._el = el;
      AMap.event.addListener(mkr, 'click', function () { collect(item.id); });
      overlays.push(mkr);
      item._marker = mkr;
    });

    // 后台获取地名
    collectItems.forEach(function (item, idx) {
      setTimeout(function () {
        geocoder.getAddress(item.lnglat, function (s, r) {
          if (s === 'complete' && r.regeocode) {
            var addr = r.regeocode.formattedAddress || '';
            var poi = (r.regeocode.pois && r.regeocode.pois[0]) || null;
            item.name = poi ? poi.name : (addr.split(',')[0] || '未知地点');
            item.addr = addr;
            updateCard(item.id);
          }
        });
      }, idx * 400);
    });

    renderCards();
    D.totalNum.textContent = collectItems.length;
    D.collectedNum.textContent = '0';
    D.progFill.style.width = '0%';
    D.progWrap.classList.add('show');
  }

  function distBetween(a, b) {
    var R = 6371000;
    var dLat = (b[1] - a[1]) * Math.PI / 180;
    var dLng = (b[0] - a[0]) * Math.PI / 180;
    var la1 = a[1] * Math.PI / 180, la2 = b[1] * Math.PI / 180;
    var sl = Math.sin(dLat / 2), sl2 = Math.sin(dLng / 2);
    return R * 2 * Math.asin(Math.sqrt(sl*sl + sl2*sl2 * Math.cos(la1) * Math.cos(la2)));
  }

  function collect(id) {
    if (collectedSet.has(id)) return;
    collectedSet.add(id);
    var item = collectItems[id];
    if (!item) return;
    item.collected = true;
    if (item._marker && item._marker._el) item._marker._el.classList.add('done');
    var card = D.collectGrid.querySelector('.c-card[data-id="' + id + '"]');
    if (card) card.classList.add('collected');
    toast('✦', item.name, item.addr || '已收集');
    updateProgress();
  }

  function updateProgress() {
    var done = collectedSet.size;
    var total = collectItems.length;
    D.collectedNum.textContent = done;
    D.progFill.style.width = (total > 0 ? (done / total * 100) : 0) + '%';
    if (done >= total && total > 0) {
      setTimeout(function () { toast('🏆', '全部收集完成！', '你已经探索了这条路线的所有秘密'); }, 600);
    }
  }

  function updateCard(id) {
    var card = D.collectGrid.querySelector('.c-card[data-id="' + id + '"]');
    if (!card) return;
    card.querySelector('.cn').textContent = collectItems[id].name;
    card.querySelector('.ca').textContent = (collectItems[id].addr || '').slice(0, 20);
  }

  function renderCards() {
    D.collectGrid.innerHTML = '';
    collectItems.forEach(function (item) {
      var card = document.createElement('div');
      card.className = 'c-card';
      card.dataset.id = item.id;
      card.innerHTML = '<div class="ci">✦</div><div class="cn">' + item.name + '</div><div class="ca"></div><div class="cb">✓</div>';
      card.addEventListener('click', function () { collect(item.id); });
      D.collectGrid.appendChild(card);
    });
  }

  // === Toast ===
  var _tto;

  function toast(icon, msg, sub) {
    clearTimeout(_tto);
    D.toast.innerHTML = '<div class="ti">' + icon + '</div><div class="tm">' + esc(msg) + '</div><div class="ts">' + esc(sub) + '</div>';
    D.toast.classList.add('show');
    _tto = setTimeout(function () { D.toast.classList.remove('show'); }, 2000);
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
})();
</script>
</body>
</html>
