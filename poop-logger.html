<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💩 拉屎打卡</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: #eee;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 40px 30px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}
.timer-section { margin: 30px 0; }
.emoji { font-size: 80px; transition: transform .3s; }
.emoji.active { animation: bounce 0.6s infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
.timer { font-size: 48px; font-weight: bold; margin: 20px 0; font-variant-numeric: tabular-nums; font-family: 'Cascadia Code', monospace; }
.btn {
  padding: 14px 40px;
  border: none;
  border-radius: 50px;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
  transition: all .2s;
  margin: 5px;
}
.btn-start { background: #e94560; color: white; }
.btn-start:hover { background: #c23152; transform: scale(1.05); }
.btn-stop { background: #0f3460; color: #aaf; }
.btn-stop:hover { background: #1a1a5e; }
.stats { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-box {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 15px 10px;
}
.stat-num { font-size: 32px; font-weight: bold; color: #e94560; }
.stat-label { font-size: 13px; color: #888; margin-top: 4px; }
.msg { margin-top: 20px; font-size: 16px; color: #ccc; min-height: 24px; }
.history { margin-top: 20px; text-align: left; max-height: 150px; overflow-y: auto; font-size: 13px; color: #aaa; }
.history-item { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
</style>
</head>
<body>
<div class="card">
  <h2>💩 拉屎打卡</h2>
  <div class="timer-section">
    <div class="emoji" id="emoji">🚽</div>
    <div class="timer" id="timer">00:00</div>
    <button class="btn btn-start" id="btnStart" onclick="start()">开始拉屎</button>
    <button class="btn btn-stop" id="btnStop" onclick="stop()" disabled style="opacity:0.4">拉完了</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="stats">
    <div class="stat-box">
      <div class="stat-num" id="count">0</div>
      <div class="stat-label">今日次数</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="total">0</div>
      <div class="stat-label">今日总时长(分)</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="best">--</div>
      <div class="stat-label">最短一泡</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="avg">--</div>
      <div class="stat-label">平均时长</div>
    </div>
  </div>
  <div class="history" id="history"></div>
</div>

<script>
const QUOTES = [
  "💪 此乃肠道排空，亦为心灵净化",
  "🧻 纸到用时方恨少",
  "📱 蹲坑刷手机的快乐，懂的都懂",
  "🧘 人生三急，此为其一",
  "📖 推荐读物：洗发水成分表",
  "⌛ 肠道通畅，人生顺畅",
  "🌊 长江后浪推前浪，一泡更比一泡强",
  "🏆 今日拉屎之王！",
  "🧘 蹲得深，拉得真",
  "🕯️ 每一个蹲坑都是一次灵魂远行",
];
let timerId, startTime, running = false;
let today = new Date().toDateString();

function load() {
  const d = JSON.parse(localStorage.getItem('poop_log')||'{"day":"","sessions":[]}');
  if (d.day !== today) d.sessions = [];
  return d;
}
function save(log) {
  log.day = today;
  localStorage.setItem('poop_log', JSON.stringify(log));
}
function renderStats(log) {
  const s = log.sessions;
  document.getElementById('count').textContent = s.length;
  if (s.length) {
    const totalSec = s.reduce((a,b)=>a+b,0);
    document.getElementById('total').textContent = Math.floor(totalSec/60);
    const times = s.map(x=>Math.floor(x/60));
    document.getElementById('best').textContent = Math.min(...times)+'分';
    document.getElementById('avg').textContent = Math.round(totalSec/s.length/60)+'分';
  }
  const h = document.getElementById('history');
  h.innerHTML = s.map((sec,i)=>{
    const d = new Date(Date.now() - sec*1000);
    return `<div class="history-item">💩 第${i+1}泡 · ${d.toLocaleTimeString()} · ${Math.floor(sec/60)}分${sec%60}秒</div>`;
  }).reverse().join('');
}
function pad(n) { return n.toString().padStart(2,'0'); }
function tick() {
  const elapsed = Math.floor((Date.now()-startTime)/1000);
  document.getElementById('timer').textContent = pad(Math.floor(elapsed/60))+':'+pad(elapsed%60);
}

window.start = function() {
  document.getElementById('emoji').textContent = '💩';
  document.getElementById('emoji').classList.add('active');
  document.getElementById('msg').textContent = QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStart').style.opacity = '0.4';
  document.getElementById('btnStop').disabled = false;
  document.getElementById('btnStop').style.opacity = '1';
  startTime = Date.now();
  running = true;
  timerId = setInterval(tick, 200);
};

window.stop = function() {
  clearInterval(timerId);
  running = false;
  const elapsed = Math.floor((Date.now()-startTime)/1000);
  document.getElementById('emoji').textContent = '🚽';
  document.getElementById('emoji').classList.remove('active');
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStart').style.opacity = '1';
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnStop').style.opacity = '0.4';
  document.getElementById('timer').textContent = '00:00';
  const mins = Math.floor(elapsed/60);
  if (mins < 3) document.getElementById('msg').textContent = '⚡ 闪电侠！' + mins + '分钟解决战斗';
  else if (mins < 10) document.getElementById('msg').textContent = '👍 标准操作，' + mins + '分钟，不拖泥带水';
  else if (mins < 20) document.getElementById('msg').textContent = '📱 刷了不少好内容吧，' + mins + '分钟';
  else if (mins < 30) document.getElementById('msg').textContent = '⚠️ 腿麻警告！' + mins + '分钟有点久了';
  else document.getElementById('msg').textContent = '🆘 ' + mins + '分钟！痔疮警告！请立即起身！';

  const log = load();
  log.sessions.push(elapsed);
  save(log);
  renderStats(log);
};

(function init(){
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnStop').style.opacity = '0.4';
  const log = load();
  if (log.sessions.length) renderStats(log);
})();
</script>
</body>
</html>
